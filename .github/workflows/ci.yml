name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }} / Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12']
        node-version: ['20', '22']
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Show runtime versions
        run: |
          python --version
          python3 --version
          node --version
          npm --version

      - name: Run authoritative verification command
        run: python -m unittest discover -s tests -v

      - name: Run control-plane validation
        run: python .claude/scripts/control_plane_check.py

      - name: Run rules fidelity validation
        run: python .claude/scripts/rules_fidelity_check.py

      - name: Exercise Bash verify wrapper
        run: bash .claude/hooks/verify.sh run rules

      - name: Exercise PowerShell verify wrapper
        shell: pwsh
        run: ./.claude/hooks/verify.ps1 run rules
