name: Bug report
description: Report a reproducible problem with the code or documentation in this repository.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please include enough detail for a maintainer to reproduce the issue without guessing.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen instead?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Exact steps, commands, or inputs needed to reproduce the issue.
      placeholder: |
        1. Run '...'
        2. Provide input '...'
        3. Observe '...'
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Paste the relevant error output, logs, stack trace, or screenshot. Redact secrets and personal data.
      render: text
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, runtime/tool versions, and any relevant configuration.
      placeholder: e.g. Windows 11, Node 20, Claude Code 1.x
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that may help diagnose the issue.
    validations:
      required: false
