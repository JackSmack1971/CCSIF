name: Bug report
description: Report a reproducible problem with the code or documentation in this repository.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please include enough detail for a maintainer to reproduce the issue without guessing.
  - type: textarea
    id: actual_expected
    attributes:
      label: Actual and expected behavior
      description: What happened, what you expected, and why it matters.
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Exact steps, commands, or inputs needed to reproduce the issue.
      placeholder: |
        1. Run '...'
        2. Provide input '...'
        3. Observe '...'
    validations:
      required: true
  - type: input
    id: affected_paths
    attributes:
      label: Affected paths or components
      description: Files, folders, modules, or UI areas involved.
      placeholder: e.g. `.github/ISSUE_TEMPLATE/bug_report.yml`, `README.md`, CLI command
    validations:
      required: false
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Paste the relevant error output, logs, stack trace, screenshot, or attachment details. Redact secrets and personal data.
      render: text
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, runtime/tool versions, and any relevant configuration.
      placeholder: e.g. Windows 11, Node 20, Claude Code 1.x
    validations:
      required: false
  - type: textarea
    id: verification
    attributes:
      label: Verification expectation
      description: How should a maintainer or agent confirm the fix?
      placeholder: Describe the command, scenario, or expected result that proves the bug is resolved.
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that may help diagnose the issue.
    validations:
      required: false
